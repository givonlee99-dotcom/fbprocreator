<!DOCTYPE html>
<html>
<head>
<title>Detail Ebook</title>
<link rel="stylesheet" href="/css/style.css" />

<style>

/* =========================
DETAIL LAYOUT
========================= */

.ebookDetail{
  max-width:900px;
  margin:60px auto;
  display:flex;
  gap:40px;
  align-items:center;
  padding:20px;
}

/* COVER */

.ebookDetail img{
  width:260px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}

/* INFO */

.detailInfo{
  flex:1;
}

.detailInfo h1{
  font-size:30px;
  margin-bottom:10px;
}

.detailInfo p{
  font-size:16px;
  color:#bbb;
  margin-bottom:20px;
}

/* BUTTON */

.detailButtons{
  display:flex;
  gap:12px;
}

.btn{
  background:#38bdf8;
  color:#fff;
  padding:10px 18px;
  border-radius:8px;
  text-decoration:none;
  font-size:15px;
}

.btn:hover{
  background:#0ea5e9;
}

</style>

</head>

<body>

<header class="navbar">
<div class="logo">
FBPro<span style="font-style: italic;color: orange;">Creator</span>
</div>

<nav id="navMenu">
<a href="/landing.html">Tentang Web</a>
<a href="/marketplace.html">Gallery</a>
<a href="/privacy-policy.html">Privasi</a>
</nav>

<div class="hamburger" id="hamburger">
<span></span>
<span></span>
<span></span>
</div>
</header>


<!-- DETAIL CONTAINER -->

<div id="detailContainer"></div>


<footer style="text-align:center;margin-top:80px;padding:20px;">
Copyright © 2026
<a href="http://localhost:3000/" style="color:#38bdf8;text-decoration:none;">
FBPro<span style="font-style: italic;color: orange;">Creator</span>
</a>
</footer>


<script>

async function loadDetail(){

const id = window.location.pathname.split("/").pop()

const res = await fetch("/api/ebooks")

const data = await res.json()

const ebook = data.find(e => e.id == id)

if(!ebook){
document.body.innerHTML="Ebook tidak ditemukan"
return
}

document.getElementById("detailContainer").innerHTML = `

<div class="ebookDetail">

<img src="/uploads/covers/${ebook.cover}">

<div class="detailInfo">

<h1>${ebook.title}</h1>

<p>
Creator :
<a href="/creator.html?name=${ebook.creator}">
${ebook.creator}
</a>
</p>

<div class="detailButtons">

<a class="btn" href="/download/${ebook.id}">
Download Ebook
</a>

</div>

</div>

</div>

`

}

loadDetail()

</script>
<script>

/* =========================
HAMBURGER MENU
========================= */

const hamburger = document.getElementById("hamburger")
const navMenu = document.getElementById("navMenu")

if(hamburger && navMenu){

hamburger.onclick = () => {

navMenu.classList.toggle("active")

}

}

</script>

</body>
</html>
