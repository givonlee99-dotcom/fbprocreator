<!doctype html>
<html>
  <head>
    <title>Upload eBook FB Pro</title>

    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <div class="upload-container">
      <!-- LEFT IMAGE -->

      <div class="upload-left">
        <img
          src="https://images.unsplash.com/photo-1556745757-8d76bdb6984b"
          alt="success"
        />
      </div>

      <!-- RIGHT FORM -->

      <div class="upload-right">
        <h1>Upload eBook FB Pro</h1>

        <p class="subtitle">
          Upload eBook FB Pro terbaru dan bagikan strategi suksesmu di <br />
          Funnel<span style="font-style: italic; color: orange">Web</span>
        </p>

        <form id="uploadForm" enctype="multipart/form-data">
          <label>Kode Lisensi Creator</label>
          <input type="text" name="license" required />

          <label>Creator</label>
          <textarea name="creator" required></textarea>

          <label>Judul file(eBook, Novel, Cerpen dll)</label>
          <textarea name="title" required></textarea>

          <label>Link Tutorial,video, konten dll</label>
          <textarea name="tutorial"></textarea>

          <label>Link Download</label>
          <textarea name="download" required></textarea>

          <label>Cover Ebook</label>
          <input type="file" name="cover" required />


          <div class="upload-buttons">
            <button type="submit" class="btn-upload">Upload Ebook</button>

            <a
              href="https://linkvertise.com/?publisherClosed=true&affiliate_id=1314520"
              target="_blank"
              class="btn-shortlink"
            >
              Daftar Shortlink
            </a>
          </div>
        </form>
      </div>
    </div>

    <script src="/js/upload.js"></script>


  </body>
</html>
